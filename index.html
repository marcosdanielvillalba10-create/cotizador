<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cotizador Corpóreos</title>

<style>
* { box-sizing:border-box; font-family:Arial,sans-serif; }
body { margin:0; padding:0; background:#f4f6f8; }
.contenedor { display:flex; flex-direction:row; max-width:1400px; margin:auto; padding:20px; gap:20px; align-items:flex-start; }
.main { flex:1; background:#fff; padding:25px; border-radius:10px; }
.logo { display:block; margin:0 auto 15px auto; width:240px; }
h2,h3 { text-align:center; margin:10px 0; }
input,select,button { width:100%; padding:8px; margin-top:5px; border:1px solid #ccc; border-radius:4px; }
button { cursor:pointer; background:#28a745; color:white; border:none; border-radius:6px; padding:12px; margin-top:10px; }
button:hover { background:#218838; }
#moduloPro { display:none; margin-top:15px; padding:10px; background:#f1f1f1; border-radius:6px; }
#historial { width:300px; background:#fff; padding:15px; border-radius:10px; height:500px; overflow-y:auto; } /* altura ajustada */
.hist-item { padding:10px; margin-bottom:10px; background:#f4f4f4; border-radius:6px; cursor:pointer; }
.hist-item:hover { background:#e0e0e0; }
#resultado { margin-top:20px; }
#btnCalcular { margin-top:10px; width:100%; }
@media(max-width:900px){
  .contenedor { flex-direction:column; }
  #historial { width:100%; height:200px; order:-1; }
  #btnCalcular { margin-top:10px; }
}
</style>
</head>
<body>

<div class="contenedor">

  <div class="main">

    <img src="logo.png" class="logo">

    <h2>Calculador estimativo de costos</h2>
    <p style="text-align:center;font-size:13px;">Presupuesto estimativo de fabricación. No incluye instalación ni materiales.</p>

    <h3>Datos del cliente</h3>
    <input id="empresa" placeholder="Empresa" data-next="contacto">
    <input id="contacto" placeholder="Responsable" data-next="tamano">

    <h3>Datos del trabajo</h3>
    <input id="tamano" type="number" placeholder="Altura en cm" data-next="material">

    <select id="material" data-next="texto">
      <option value="">Material</option>
      <option>Chapa galvanizada</option>
      <option>Acero inoxidable</option>
    </select>

    <input id="texto" placeholder="Texto del cartel" data-next="generarBtn">

    <div style="display:flex; gap:10px;">
      <button id="generarBtn">Generar presupuesto</button>
      <button onclick="descargar()">Descargar presupuesto</button>
    </div>

    <div id="resultado"></div>

  </div>

  <div style="display:flex; flex-direction:column; gap:10px;">
    <div id="historial">
      <h3>Historial</h3>
      <div id="hist-items"></div>
    </div>
    <button id="btnCalcular" onclick="togglePro()">Calcular materiales</button>
    <div id="moduloPro">
      <h3>Estimación técnica</h3>
      <select id="frente">
        <option>Acrílico</option>
        <option>Chapa</option>
      </select>

      <select id="base">
        <option>Contraletra</option>
        <option>Patitas</option>
      </select>

      <select id="iluminacion">
        <option>Sin luz</option>
        <option>Frontal</option>
        <option>Retro</option>
      </select>

      <input id="desperdicio" type="number" value="15" placeholder="Desperdicio %">
      <input id="densidad" type="number" value="35" placeholder="Densidad LED">

      <button onclick="calcularPro()">Calcular</button>
      <div id="resultadoPro"></div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
const state={empresa:"", contacto:"", tamano:"", material:"", texto:""};

document.querySelectorAll("input,select").forEach(el=>{
  el.addEventListener("keydown", e=>{
    if(e.key==="Enter"){
      e.preventDefault();
      const next=el.getAttribute("data-next");
      if(next) document.getElementById(next)?.focus();
    }
  });
});

const cap=s=>s.toLowerCase().replace(/\b\w/g,l=>l.toUpperCase());

empresa.oninput=e=>state.empresa=cap(e.target.value);
contacto.oninput=e=>state.contacto=cap(e.target.value);
tamano.oninput=e=>state.tamano=parseInt(e.target.value)||0;
material.onchange=e=>state.material=e.target.value;
texto.oninput=e=>state.texto=e.target.value.toUpperCase();

function letras(){ return (state.texto||"").replace(/\s/g,"").length; }

function precioBase(){ 
  let altura=state.tamano; 
  let p=0;
  if(altura>=20 && altura<=30) p=1200;
  else if(altura>=31 && altura<=50) p=1100;
  else if(altura>=51 && altura<=90) p=1200;
  if(state.material==="Acero inoxidable") p+=8000;
  return p;
}

// precio por letra
function precioPorLetra(){ return precioBase() * state.tamano; }
function totalPrecio(){ return precioPorLetra() * letras(); }

function ok(){ return state.empresa && state.contacto && state.tamano && state.material && state.texto; }

document.getElementById("generarBtn").onclick=generar;

function generar(){
  if(!ok()){ alert("Para generar el presupuesto debes completar todos los campos"); return; }

  const fecha=new Date().toLocaleString();
  const cantidad=letras();
  const precioLetra=precioPorLetra();
  const total=totalPrecio();

  const presupuestoHTML=`
<div id="print" style="max-width:600px;margin:auto;padding:25px;background:#fff;border:1px solid #eee;font-family:Arial;color:#111;">
  <div style="text-align:center;margin-bottom:20px;">
    <img src="logo.png" style="width:240px;margin-bottom:10px;">
    <h2 style="margin:0;">PRESUPUESTO DE FABRICACIÓN</h2>
    <p style="font-size:12px;color:#666;">${fecha}</p>
  </div>
  <hr>
  <h3 style="font-size:14px;">Datos del cliente</h3>
  <p><b>Empresa:</b> ${state.empresa}</p>
  <p><b>Responsable:</b> ${state.contacto}</p>
  <hr>
  <h3 style="font-size:14px;">Características del trabajo</h3>
  <p><b>Altura:</b> ${state.tamano} cm</p>
  <p><b>Material:</b> ${state.material}</p>
  <p><b>Texto:</b> ${state.texto}</p>
  <hr>
  <div style="text-align:right;">
    <p>Cantidad letras: <b>${cantidad}</b></p>
    <p>Precio por letra: <b>$${precioLetra}</b></p>
  </div>
  <div style="margin-top:20px;padding:15px;background:#f4f6f8;text-align:center;border-radius:8px;">
    <p style="margin:0;font-size:13px;color:#555;">TOTAL ESTIMADO</p>
    <h1 style="margin:5px 0;">$${total}</h1>
  </div>
</div>`;

  document.getElementById("resultado").innerHTML=presupuestoHTML;
  document.getElementById("resultado").scrollIntoView({behavior:"smooth", block:"center"});

  // historial local
  let historial=JSON.parse(localStorage.getItem("historial")||"[]");
  historial.push({empresa:state.empresa,contacto:state.contacto,tamano:state.tamano,material:state.material,texto:state.texto,fecha,precioLetra,total});
  if(historial.length>15) historial=historial.slice(-15);
  localStorage.setItem("historial",JSON.stringify(historial));
  loadHistorial();
}

function descargar(){
  const el=document.getElementById("print");
  if(!el){ alert("No hay presupuesto generado"); return; }
  html2canvas(el,{scale:2}).then(canvas=>{
    const a=document.createElement("a");
    a.download="presupuesto.png";
    a.href=canvas.toDataURL();
    a.click();
  });
}

function togglePro(){
  const m=document.getElementById("moduloPro");
  m.style.display = m.style.display==="block"?"none":"block";
}

function calcularPro(){
  const cantidad=letras(); if(!cantidad) return;
  const desperdicio=parseFloat(document.getElementById("desperdicio").value||0)/100;
  const densidad=parseFloat(document.getElementById("densidad").value||0);
  const frente=document.getElementById("frente").value;
  const iluminacion=document.getElementById("iluminacion").value;
  const m2=cantidad*0.1;
  const leds=m2*densidad;
  let score=100;
  if(frente==="Chapa") score-=8;
  if(iluminacion==="Retro") score-=10;
  if(iluminacion==="Frontal") score-=5;
  if(desperdicio>0.15) score-=12;
  if(densidad<30 || densidad>40) score-=15;
  if(cantidad>50) score-=8;
  if(score>85) score=85;
  if(score<45) score=45;
  let nivel=score>=80?"Alta":score>=60?"Media":"Baja";
  resultadoPro.innerHTML=`m²: ${m2.toFixed(2)}<br>LED estimados: ${Math.round(leds)}<br>Con desperdicio: ${(m2*(1+desperdicio)).toFixed(2)} m²<br><br><b>Confiabilidad: ${nivel} (${score}%)</b>`;
}

function loadHistorial(){
  const container=document.getElementById("hist-items");
  container.innerHTML="";
  let historial=JSON.parse(localStorage.getItem("historial")||"[]");
  historial.slice(-15).reverse().forEach(item=>{
    const div=document.createElement("div");
    div.className="hist-item";
    div.innerHTML=`<b>${item.texto}</b><br>${item.empresa} - ${item.contacto}<br>${item.fecha} - $${item.total}`;
    div.onclick=()=>{
      state.empresa=item.empresa;
      state.contacto=item.contacto;
      state.tamano=item.tamano;
      state.material=item.material;
      state.texto=item.texto;

      // mostrar presupuesto centrado
      const cantidad=letras();
      const precioLetra=precioPorLetra();
      const total=totalPrecio();
      const fecha=item.fecha;
      const presupuestoHTML=`
<div id="print" style="max-width:600px;margin:auto;padding:25px;background:#fff;border:1px solid #eee;font-family:Arial;color:#111;">
  <div style="text-align:center;margin-bottom:20px;">
    <img src="logo.png" style="width:240px;margin-bottom:10px;">
    <h2 style="margin:0;">PRESUPUESTO DE FABRICACIÓN</h2>
    <p style="font-size:12px;color:#666;">${fecha}</p>
  </div>
  <hr>
  <h3 style="font-size:14px;">Datos del cliente</h3>
  <p><b>Empresa:</b> ${state.empresa}</p>
  <p><b>Responsable:</b> ${state.contacto}</p>
  <hr>
  <h3 style="font-size:14px;">Características del trabajo</h3>
  <p><b>Altura:</b> ${state.tamano} cm</p>
  <p><b>Material:</b> ${state.material}</p>
  <p><b>Texto:</b> ${state.texto}</p>
  <hr>
  <div style="text-align:right;">
    <p>Cantidad letras: <b>${cantidad}</b></p>
    <p>Precio por letra: <b>$${precioLetra}</b></p>
  </div>
  <div style="margin-top:20px;padding:15px;background:#f4f6f8;text-align:center;border-radius:8px;">
    <p style="margin:0;font-size:13px;color:#555;">TOTAL ESTIMADO</p>
    <h1 style="margin:5px 0;">$${total}</h1>
  </div>
</div>`;
      document.getElementById("resultado").innerHTML=presupuestoHTML;
      document.getElementById("resultado").scrollIntoView({behavior:"smooth", block:"center"});
    };
    container.appendChild(div);
  });
}

// cargar historial al inicio
loadHistorial();
</script>
</body>
</html>
