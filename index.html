<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cotizador Corpóreos</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');

* { box-sizing: border-box; font-family: 'Inter', Arial, sans-serif; }
body { margin:0; padding:0; background:#f9f9fb; color:#333; }
.contenedor { display:flex; flex-direction:row; max-width:1400px; margin:auto; padding:20px; gap:20px; align-items:flex-start; }
.main { flex:1; background:#fff; padding:20px; border-radius:10px; box-shadow:0 3px 10px rgba(0,0,0,0.05); }
.logo { display:block; margin:0 auto 20px auto; width:240px; }
h2,h3 { text-align:center; margin:15px 0; }
input,select { width:100%; padding:8px; margin-top:5px; border:1px solid #ccc; border-radius:6px; transition: border 0.2s; font-size:14px; text-transform:uppercase; }
input:focus, select:focus { border-color:#007bff; outline:none; }
button { cursor:pointer; border:none; border-radius:6px; padding:12px; margin-top:10px; transition: background 0.2s; font-size:14px; }
#generarBtn, #descargarBtn, #btnCalcular { background:#007bff; color:#fff; width:100%; }
#generarBtn:hover, #descargarBtn:hover, #btnCalcular:hover { background:#0056b3; }
#btnCalcular { font-size:16px; }

#moduloPro { display:none; margin-top:10px; padding:15px; background:#f1f1f1; border-radius:6px; box-shadow:0 2px 6px rgba(0,0,0,0.1); max-width:300px; }

#historial { width:300px; background:#fff; padding:15px; border-radius:10px; height:500px; overflow-y:auto; box-shadow:0 3px 10px rgba(0,0,0,0.05); font-size:14px; }
.hist-item { padding:8px; margin-bottom:8px; background:#f4f4f4; border-radius:6px; cursor:pointer; transition: background 0.2s; }
.hist-item:hover { background:#e0f0ff; }

#resultado { margin-top:20px; }

.checkbox-container { display:flex; align-items:center; margin-top:15px; gap:10px; font-size:14px; }
.checkbox-container input { width:auto; }
.terminos-btn { background:none; border:none; color:#007bff; font-size:12px; cursor:pointer; text-decoration:underline; padding:0; }

.modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); display:none; justify-content:center; align-items:center; z-index:1000; }
.modal { background:#fff; padding:20px; border-radius:10px; max-width:400px; max-height:80vh; overflow-y:auto; box-shadow:0 5px 20px rgba(0,0,0,0.3); font-size:14px; }

@media(max-width:900px){
  .contenedor { flex-direction:column; }
  #historial { width:100%; height:200px; order:-1; }
  #btnCalcular { margin-top:10px; }
}
</style>
</head>
<body>

<div class="contenedor">

  <div class="main">

    <img src="logo.png" class="logo">

    <h2>Calculador estimativo de costos</h2>
    <p style="text-align:center;font-size:13px;">Presupuesto estimativo de fabricación. No incluye instalación ni materiales.</p>

    <h3>Datos del cliente</h3>
    <input id="empresa" placeholder="Empresa" data-next="contacto">
    <input id="contacto" placeholder="Responsable" data-next="tamano">

    <h3>Datos del trabajo</h3>
    <input id="tamano" type="number" placeholder="Altura en cm" data-next="material">

    <select id="material" data-next="texto">
      <option value="">Material</option>
      <option>Chapa galvanizada</option>
      <option>Acero inoxidable</option>
    </select>

    <input id="texto" placeholder="Texto del cartel" data-next="generarBtn">

    <div class="checkbox-container">
      <input type="checkbox" id="acepto">
      <span>He leído y acepto los <button class="terminos-btn" onclick="abrirTerminos()">términos y condiciones</button></span>
    </div>

    <div style="display:flex; gap:10px; flex-direction:column;">
      <button id="generarBtn">Generar presupuesto</button>
      <button id="descargarBtn" onclick="descargar()">Descargar presupuesto</button>
    </div>

    <div id="resultado"></div>

  </div>

  <div>
    <div id="historial">
      <h3>Historial</h3>
      <div id="hist-items"></div>
    </div>
    <button id="btnCalcular" onclick="togglePro()">Calcular materiales</button>

    <div id="moduloPro">
      <h3>Estimación técnica</h3>

      <select id="frente">
        <option>Acrílico</option>
        <option>Chapa</option>
      </select>

      <select id="base">
        <option>Contraletra</option>
        <option>Patitas</option>
      </select>

      <select id="iluminacion">
        <option>Sin luz</option>
        <option>Frontal</option>
        <option>Retro</option>
      </select>

      <!-- NUEVO -->
      <label style="font-size:13px; margin-top:10px; display:block;">Tipo de tipografía</label>
      <select id="tipoLetra">
        <option value="0.11">Simple</option>
        <option value="0.14" selected>Normal</option>
        <option value="0.18">Compleja</option>
      </select>

      <!-- MEJORADOS -->
      <label style="font-size:13px; margin-top:10px; display:block;">Desperdicio (%)</label>
      <input id="desperdicio" type="number" value="15">
      <small style="color:#666;">Estándar: 15%</small>

      <label style="font-size:13px; margin-top:10px; display:block;">Densidad LED (por m²)</label>
      <input id="densidad" type="number" value="35">
      <small style="color:#666;">Estándar: 35 LED/m²</small>

      <!-- ALERTA -->
      <div id="alertaConfig" style="display:none;font-size:11px;color:#888;margin-top:5px;">
        Valores personalizados
      </div>

      <button onclick="calcularPro()">Calcular</button>
      <div id="resultadoPro"></div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
/* TODO tu script intacto arriba */

/* SOLO modificación real */
function calcularPro(){
  const cantidad=letras(); if(!cantidad) return;

  const factor = parseFloat(document.getElementById("tipoLetra").value);
  const m2 = cantidad * factor;

  const desperdicio=parseFloat(document.getElementById("desperdicio").value||0)/100;
  const densidad=parseFloat(document.getElementById("densidad").value||0);

  const frente=document.getElementById("frente").value;
  const iluminacion=document.getElementById("iluminacion").value;

  const leds=m2*densidad;

  let score=100;
  if(frente==="Chapa") score-=8;
  if(iluminacion==="Retro") score-=10;
  if(iluminacion==="Frontal") score-=5;
  if(desperdicio>0.15) score-=12;
  if(densidad<30 || densidad>40) score-=15;
  if(cantidad>50) score-=8;
  if(score>85) score=85;
  if(score<45) score=45;

  let nivel=score>=80?"Alta":score>=60?"Media":"Baja";

  resultadoPro.innerHTML=`m²: ${m2.toFixed(2)}<br>LED estimados: ${Math.round(leds)}<br>Con desperdicio: ${(m2*(1+desperdicio)).toFixed(2)} m²<br><br><b>Confiabilidad: ${nivel} (${score}%)</b>`;
}

/* alerta liviana */
const d = document.getElementById("desperdicio");
const l = document.getElementById("densidad");
const alerta = document.getElementById("alertaConfig");

function check(){
  if(d.value != 15 || l.value != 35){
    alerta.style.display = "block";
  } else {
    alerta.style.display = "none";
  }
}
d.addEventListener("input", check);
l.addEventListener("input", check);
</script>

</body>
</html>
