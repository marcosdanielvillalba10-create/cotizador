<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
const state = { empresa:"", contacto:"", tamano:"", material:"", texto:"" };

document.querySelectorAll("input,select").forEach(el=>{
  el.addEventListener("keydown", e=>{
    if(e.key==="Enter"){ 
      e.preventDefault(); 
      const next = el.getAttribute("data-next"); 
      if(next) document.getElementById(next)?.focus(); 
    }
  });
});

const cap = s => s.toLowerCase().replace(/\b\w/g, l => l.toUpperCase());
empresa.oninput = e => state.empresa = cap(e.target.value);
contacto.oninput = e => state.contacto = cap(e.target.value);
tamano.oninput = e => state.tamano = parseInt(e.target.value)||0;
material.onchange = e => state.material = e.target.value;
texto.oninput = e => state.texto = e.target.value.toUpperCase();

function letras(){ return (state.texto||"").replace(/\s/g,"").length; }

function precioBase() {
  let altura = state.tamano;
  let p = 0;
  if (altura >= 20 && altura <= 30) p = 1200;
  else if (altura >= 31 && altura <= 50) p = 1100;
  else if (altura >= 51 && altura <= 90) p = 1200;
  return p;
}

function precioPorLetra() {
  let precio = precioBase() * state.tamano + 2000;
  if (state.material === "Acero inoxidable") precio += 8000;
  return precio;
}

function totalPrecio() {
  return letras() * precioPorLetra();
}

function ok(){ 
  return state.empresa && state.contacto && state.tamano && state.material && state.texto && document.getElementById("acepto").checked; 
}

document.getElementById("generarBtn").onclick = generar;

function generar(){
  if(!ok()){ alert("Completa todos los campos y acepta términos."); return; }

  const fecha = new Date().toLocaleString();
  const cantidad = letras();
  const precioLetra = precioPorLetra();
  const total = totalPrecio();

  const presupuestoHTML = `<div id="print" style="max-width:700px;margin:auto;padding:15px;background:#fff;border:1px solid #eee;font-family:Arial;color:#111;">
  <div style="text-align:center;margin-bottom:15px;">
    <img src="logo.png" style="width:240px;margin-bottom:10px;">
    <h2 style="margin:0;">PRESUPUESTO DE FABRICACIÓN</h2>
    <p style="font-size:12px;color:#666;">${fecha}</p>
  </div>
  <hr>
  <h3 style="font-size:14px;">Datos del cliente</h3>
  <p><b>Empresa:</b> ${state.empresa}</p>
  <p><b>Responsable:</b> ${state.contacto}</p>
  <hr>
  <h3 style="font-size:14px;">Características del trabajo</h3>
  <p><b>Altura:</b> ${state.tamano} cm</p>
  <p><b>Material:</b> ${state.material}</p>
  <p><b>Texto:</b> ${state.texto}</p>
  <hr>
  <div style="text-align:right;">
    <p>Cantidad letras: <b>${cantidad}</b></p>
    <p>Precio por letra: <b>$${precioLetra}</b></p>
  </div>
  <div style="margin-top:15px;padding:10px;background:#f4f6f8;text-align:center;border-radius:8px;">
    <p style="margin:0;font-size:13px;color:#555;">TOTAL ESTIMADO</p>
    <h1 style="margin:5px 0;">$${total}</h1>
  </div>
  <p style="font-size:11px;color:#777;text-align:center;margin-top:15px;">
    Presupuesto estimativo de fabricación. No incluye instalación ni materiales.<br>
    <b>Términos y condiciones:</b> El material se retira en su totalidad por un único punto y una sola vez. Seña del 50%. Deben enviar el archivo. No incluye material ni instalación. Presupuesto válido solo si se cumplen las condiciones.
  </p></div>`;

  document.getElementById("resultado").innerHTML = presupuestoHTML;
  document.getElementById("resultado").scrollIntoView({behavior:"smooth", block:"center"});

  let historial = JSON.parse(localStorage.getItem("historial")||"[]");
  historial.push({empresa: state.empresa, contacto: state.contacto, tamano: state.tamano, material: state.material, texto: state.texto, fecha, total});
  if(historial.length>15) historial = historial.slice(-15);
  localStorage.setItem("historial", JSON.stringify(historial));
  loadHistorial();
}

function togglePro(){
  const m=document.getElementById("moduloPro");
  if(m.style.display==="block"){ m.style.display="none"; }
  else { 
    m.style.display="block"; 
    m.scrollIntoView({behavior:"smooth", block:"start"});
  }
}

// ------------------- NUEVA FUNCIÓN calcularPro() -------------------
function calcularPro(){
  const resultadoPro = document.getElementById("resultadoPro"); // CORRECCIÓN
  const texto = state.texto || "";
  const tamano = state.tamano || 0; 
  if(!texto || !tamano) return;

  const distanciaModulo = 5; 
  let totalLEDs = 0;

  const letrasLongitud = {
    "A": tamano*2, "B": tamano*2, "C": tamano*1.5, "D": tamano*2, "E": tamano*1.5, "F": tamano*1.5,
    "G": tamano*1.5, "H": tamano*2, "I": tamano, "J": tamano*1.5, "K": tamano*2, "L": tamano,
    "M": tamano*5, "N": tamano*3, "O": tamano*3, "P": tamano*2, "Q": tamano*3, "R": tamano*2,
    "S": tamano*2, "T": tamano*1.5, "U": tamano*2, "V": tamano*2, "W": tamano*3, "X": tamano*2,
    "Y": tamano*2, "Z": tamano*2
  };

  for(let l of texto.toUpperCase()){
    let longitud = letrasLongitud[l] || tamano; 
    let ledsLetra = Math.ceil(longitud / distanciaModulo);
    totalLEDs += ledsLetra;
  }

  const desperdicio = parseFloat(document.getElementById("desperdicio").value||0)/100;
  const ledsConDesperdicio = Math.ceil(totalLEDs * (1 + desperdicio));
  const m2 = (totalLEDs * 0.015).toFixed(2); 

  resultadoPro.innerHTML = `
    LED estimados: ${ledsConDesperdicio} <br>
    Total módulos sin desperdicio: ${totalLEDs} <br>
    Área aproximada: ${m2} m² <br>
    Desperdicio aplicado: ${(desperdicio*100).toFixed(1)}%
    <br><br>
    <button onclick="descargarPresupuestoCompleto()">Descargar presupuesto</button>
  `;
}

// ------------------- DESCARGA COMPLETA -------------------
function descargarPresupuestoCompleto(){
  const printDiv = document.getElementById("print");
  const proDiv = document.getElementById("resultadoPro");
  if(!printDiv || !proDiv){ alert("Primero genera presupuesto y cálculo de materiales."); return; }

  // Combinar los dos divs en uno temporal
  const tempDiv = document.createElement("div");
  tempDiv.style.background="#fff";
  tempDiv.style.padding="15px";
  tempDiv.appendChild(printDiv.cloneNode(true));
  tempDiv.appendChild(proDiv.cloneNode(true));

  html2canvas(tempDiv,{scale:2}).then(canvas=>{
    const a=document.createElement("a");
    a.download="presupuesto_completo.png";
    a.href=canvas.toDataURL();
    a.click();
  });
}

// ------------------- Historial -------------------
function loadHistorial(){
  const container=document.getElementById("hist-items");
  container.innerHTML="";
  let historial=JSON.parse(localStorage.getItem("historial")||"[]");
  historial.slice(-15).reverse().forEach(item=>{
    const div=document.createElement("div");
    div.className="hist-item";
    div.innerHTML=`<b>${item.texto}</b><br>${item.empresa} - ${item.contacto}<br>${item.fecha} - $${item.total}`;
    div.onclick=()=>{
      state.empresa=item.empresa;
      state.contacto=item.contacto;
      state.tamano=item.tamano;
      state.material=item.material;
      state.texto=item.texto;
      generar();
    };
    container.appendChild(div);
  });
}

loadHistorial();

function abrirTerminos(){ document.getElementById("modalOverlay").style.display="flex"; }
function cerrarTerminos(){ document.getElementById("modalOverlay").style.display="none"; }
</script>
