<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
// Estado global
const state = {empresa:"", contacto:"", tamano:0, material:"", texto:""};

// Navegación con Enter
document.querySelectorAll("input,select").forEach(el=>{
  el.addEventListener("keydown", e=>{
    if(e.key==="Enter"){
      e.preventDefault();
      const next=el.getAttribute("data-next");
      if(next) document.getElementById(next)?.focus();
    }
  });
});

// Forzar mayúsculas al escribir
empresa.oninput = e => state.empresa = e.target.value.toUpperCase();
contacto.oninput = e => state.contacto = e.target.value.toUpperCase();
texto.oninput = e => state.texto = e.target.value.toUpperCase();
tamano.oninput = e => state.tamano = parseInt(e.target.value)||0;
material.onchange = e => state.material = e.target.value;

// Funciones de cálculo
function letras(){ return (state.texto||"").replace(/\s/g,"").length; }

function precioBase(){
  let altura = state.tamano; 
  let p = 0;
  if(altura>=20 && altura<=30) p=1200;
  else if(altura>=31 && altura<=50) p=1100;
  else if(altura>=51 && altura<=90) p=1200;
  if(state.material==="Acero inoxidable") p+=8000;
  return p;
}

// Cálculo total: altura × precio × cantidad de letras + 2000 por letra
function totalPrecio(){
  const cantidad = letras();
  const base = precioBase();
  return cantidad * base * state.tamano + cantidad * 2000;
}

// Validación de campos completa y correcta
function ok(){
  return state.empresa?.trim() !== "" &&
         state.contacto?.trim() !== "" &&
         state.tamano > 0 &&
         state.material?.trim() !== "" &&
         state.texto?.trim() !== "" &&
         document.getElementById("acepto").checked;
}

// Generar presupuesto
document.getElementById("generarBtn").onclick = generar;

function generar(){
  if(!ok()){ 
    alert("Para generar el presupuesto debes completar todos los campos y aceptar los términos."); 
    return; 
  }

  const fecha = new Date().toLocaleString();
  const cantidad = letras();
  const precioLetra = precioBase();
  const total = totalPrecio();

  const presupuestoHTML=`
<div id="print" style="max-width:700px;margin:auto;padding:15px;background:#fff;border:1px solid #eee;font-family:Arial;color:#111;">
  <div style="text-align:center;margin-bottom:15px;">
    <img src="logo.png" style="width:240px;margin-bottom:10px;">
    <h2 style="margin:0;">PRESUPUESTO DE FABRICACIÓN</h2>
    <p style="font-size:12px;color:#666;">${fecha}</p>
  </div>
  <hr>
  <h3 style="font-size:14px;">Datos del cliente</h3>
  <p><b>Empresa:</b> ${state.empresa}</p>
  <p><b>Responsable:</b> ${state.contacto}</p>
  <hr>
  <h3 style="font-size:14px;">Características del trabajo</h3>
  <p><b>Altura:</b> ${state.tamano} cm</p>
  <p><b>Material:</b> ${state.material}</p>
  <p><b>Texto:</b> ${state.texto}</p>
  <hr>
  <div style="text-align:right;">
    <p>Cantidad letras: <b>${cantidad}</b></p>
    <p>Precio por letra: <b>$${precioLetra}</b></p>
  </div>
  <div style="margin-top:15px;padding:10px;background:#f4f6f8;text-align:center;border-radius:8px;">
    <p style="margin:0;font-size:13px;color:#555;">TOTAL ESTIMADO</p>
    <h1 style="margin:5px 0;">$${total}</h1>
  </div>
  <p style="font-size:11px;color:#777;text-align:center;margin-top:15px;">
    Presupuesto estimativo de fabricación. No incluye instalación ni materiales.<br>
    <b>Términos y condiciones:</b> El material se retira en su totalidad por un único punto y una sola vez. Seña del 50%. Deben enviar el archivo. No incluye material ni instalación. Presupuesto válido solo si se cumplen las condiciones.
  </p>
</div>`;

  document.getElementById("resultado").innerHTML = presupuestoHTML;
  document.getElementById("resultado").scrollIntoView({behavior:"smooth", block:"center"});

  // Guardar historial
  let historial = JSON.parse(localStorage.getItem("historial")||"[]");
  historial.push({empresa:state.empresa,contacto:state.contacto,tamano:state.tamano,material:state.material,texto:state.texto,fecha,total});
  if(historial.length>15) historial = historial.slice(-15);
  localStorage.setItem("historial",JSON.stringify(historial));
  loadHistorial();
}

// Descargar presupuesto
function descargar(){
  const el=document.getElementById("print");
  if(!el){ alert("No hay presupuesto generado"); return; }
  html2canvas(el,{scale:2}).then(canvas=>{
    const a=document.createElement("a");
    a.download="presupuesto.png";
    a.href=canvas.toDataURL();
    a.click();
  });
}

// Toggle módulo pro
function togglePro(){
  const m=document.getElementById("moduloPro");
  m.style.display = m.style.display==="block"?"none":"block";
}

// Cálculo técnico (sin cambios)
function calcularPro(){
  const cantidad=letras(); if(!cantidad) return;
  const desperdicio=parseFloat(document.getElementById("desperdicio").value||0)/100;
  const densidad=parseFloat(document.getElementById("densidad").value||0);
  const frente=document.getElementById("frente").value;
  const iluminacion=document.getElementById("iluminacion").value;
  const m2=cantidad*0.1;
  const leds=m2*densidad;
  let score=100;
  if(frente==="Chapa") score-=8;
  if(iluminacion==="Retro") score-=10;
  if(iluminacion==="Frontal") score-=5;
  if(desperdicio>0.15) score-=12;
  if(densidad<30 || densidad>40) score-=15;
  if(cantidad>50) score-=8;
  if(score>85) score=85;
  if(score<45) score=45;
  let nivel=score>=80?"Alta":score>=60?"Media":"Baja";
  resultadoPro.innerHTML=`m²: ${m2.toFixed(2)}<br>LED estimados: ${Math.round(leds)}<br>Con desperdicio: ${(m2*(1+desperdicio)).toFixed(2)} m²<br><br><b>Confiabilidad: ${nivel} (${score}%)</b>`;
}

// Historial
function loadHistorial(){
  const container=document.getElementById("hist-items");
  container.innerHTML="";
  let historial=JSON.parse(localStorage.getItem("historial")||"[]");
  historial.slice(-15).reverse().forEach(item=>{
    const div=document.createElement("div");
    div.className="hist-item";
    div.innerHTML=`<b>${item.texto}</b><br>${item.empresa} - ${item.contacto}<br>${item.fecha} - $${item.total}`;
    div.onclick=()=>{
      state.empresa=item.empresa;
      state.contacto=item.contacto;
      state.tamano=item.tamano;
      state.material=item.material;
      state.texto=item.texto;

      const cantidad=letras();
      const precioLetra=precioBase();
      const total=totalPrecio();
      const fecha=item.fecha;

      const presupuestoHTML=`
<div id="print" style="max-width:700px;margin:auto;padding:15px;background:#fff;border:1px solid #eee;font-family:Arial;color:#111;">
  <div style="text-align:center;margin-bottom:15px;">
    <img src="logo.png" style="width:240px;margin-bottom:10px;">
    <h2 style="margin:0;">PRESUPUESTO DE FABRICACIÓN</h2>
    <p style="font-size:12px;color:#666;">${fecha}</p>
  </div>
  <hr>
  <h3 style="font-size:14px;">Datos del cliente</h3>
  <p><b>Empresa:</b> ${state.empresa}</p>
  <p><b>Responsable:</b> ${state.contacto}</p>
  <hr>
  <h3 style="font-size:14px;">Características del trabajo</h3>
  <p><b>Altura:</b> ${state.tamano} cm</p>
  <p><b>Material:</b> ${state.material}</p>
  <p><b>Texto:</b> ${state.texto}</p>
  <hr>
  <div style="text-align:right;">
    <p>Cantidad letras: <b>${cantidad}</b></p>
    <p>Precio por letra: <b>$${precioLetra}</b></p>
  </div>
  <div style="margin-top:15px;padding:10px;background:#f4f6f8;text-align:center;border-radius:8px;">
    <p style="margin:0;font-size:13px;color:#555;">TOTAL ESTIMADO</p>
    <h1 style="margin:5px 0;">$${total}</h1>
  </div>
  <p style="font-size:11px;color:#777;text-align:center;margin-top:15px;">
    Presupuesto estimativo de fabricación. No incluye instalación ni materiales.<br>
    <b>Términos y condiciones:</b> El material se retira en su totalidad por un único punto y una sola vez. Seña del 50%. Deben enviar el archivo. No incluye material ni instalación. Presupuesto válido solo si se cumplen las condiciones.
  </p>
</div>`;

      document.getElementById("resultado").innerHTML=presupuestoHTML;
      document.getElementById("resultado").scrollIntoView({behavior:"smooth", block:"center"});
    };
    container.appendChild(div);
  });
}

loadHistorial();

function abrirTerminos(){ document.getElementById("modalOverlay").style.display="flex"; }
function cerrarTerminos(){ document.getElementById("modalOverlay").style.display="none"; }
</script>
